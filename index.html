<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Pool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Private Prediction Pool</p>
        <h1>World Cup Pool</h1>
        <p class="subhead">Live leaderboard and actual group standings, refreshed every minute.</p>
      </div>
      <div class="meta-card">
        <div class="meta-label">Last updated</div>
        <div id="updatedAt" class="meta-value">Waiting for data...</div>
      </div>
    </header>

    <main class="grid">
      <section class="card wide">
        <div class="card-header">
          <h2>Leaderboard</h2>
          <span class="pill">Auto-refreshing</span>
        </div>
        <div class="table-wrap">
          <table id="leaderboard">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Total</th>
                <th>Perfect</th>
                <th>Excellent</th>
                <th>Good</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="card wide">
        <div class="card-header">
          <h2>Actual group standings</h2>
          <span class="pill">Live / demo data</span>
        </div>
        <div id="groups" class="groups-grid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
